services:
  - type: web
    name: job-tracker-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: eu-north-1
      - key: AWS_BUCKET_NAME
        value: jobtracker-resumeuploads
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: "Job Tracker <noreply@kanishkakhullar.dev>"
